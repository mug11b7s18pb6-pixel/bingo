<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>共有ビンゴ 主催者 SDK認証版</title>
<style>
:root{--bg1:#0f172a;--bg2:#1e293b;--line:rgba(255,255,255,0.14);--text:#f8fafc;--muted:#cbd5e1;--blue1:#0ea5e9;--blue2:#0284c7;--green1:#22c55e;--green2:#16a34a;--gray1:#475569;--gray2:#334155;--orange1:#f59e0b;--orange2:#d97706;--red1:#ef4444;--red2:#dc2626;--pink1:#ec4899;--pink2:#db2777}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;min-height:100%}
body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--text);background:radial-gradient(circle at top, rgba(56,189,248,0.18), transparent 35%),linear-gradient(180deg,var(--bg1),var(--bg2));display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
.app{width:100%;max-width:520px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));backdrop-filter: blur(12px);box-shadow:0 18px 40px rgba(0,0,0,0.35);padding:18px}
.title{text-align:center;font-size:1rem;color:var(--muted);margin-bottom:10px;letter-spacing:.08em}
.panel{border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,0.04);padding:14px;margin-bottom:12px}
.number-stage{min-height:230px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.number{font-size:clamp(7rem,36vw,12rem);font-weight:900;line-height:1;letter-spacing:.04em;text-shadow:0 6px 24px rgba(56,189,248,0.22)}
.number.pop{animation:pop .32s ease}
@keyframes pop{0%{transform:scale(.82);opacity:.65}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.status{margin-top:12px;font-size:.95rem;color:var(--muted);min-height:1.4em}
.room-status{margin-top:8px;font-size:.82rem;color:var(--muted)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}.field:last-child{margin-bottom:0}.field label{font-size:.8rem;color:var(--muted)}
input[type="text"],input[type="number"],input[type="password"]{width:100%;border:1px solid var(--line);background:rgba(255,255,255,0.06);color:var(--text);border-radius:12px;padding:10px 12px;font-size:.95rem}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
button{border:none;border-radius:16px;padding:13px 12px;font-size:.95rem;font-weight:700;color:white;cursor:pointer}
.primary{background:linear-gradient(180deg,var(--blue1),var(--blue2))}.secondary{background:linear-gradient(180deg,var(--gray1),var(--gray2))}.success{background:linear-gradient(180deg,var(--green1),var(--green2))}.warn{background:linear-gradient(180deg,var(--orange1),var(--orange2))}.danger{background:linear-gradient(180deg,var(--red1),var(--red2))}.accent{background:linear-gradient(180deg,var(--pink1),var(--pink2))}.small{padding:10px 12px;font-size:.84rem;border-radius:12px}
.inline{display:flex;gap:10px;align-items:center}.inline>*{flex:1}
.accordion-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(255,255,255,0.06);border:1px solid var(--line);border-radius:16px;padding:9px 12px;font-size:.84rem;font-weight:700;color:var(--text)}
.accordion-icon{transition:transform .2s ease}.accordion-btn[aria-expanded="true"] .accordion-icon{transform:rotate(180deg)} .settings-panel{display:none;margin-top:10px}.settings-panel.open{display:block}
.note{font-size:.8rem;color:var(--muted);line-height:1.5}
.bingo-head{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px}.bingo-head div{text-align:center;font-weight:900;color:#fff;background:linear-gradient(180deg,#0ea5e9,#0369a1);border:1px solid rgba(255,255,255,0.22);border-radius:10px;padding:8px 0;text-shadow:0 1px 3px rgba(0,0,0,0.35)}
.bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;position:relative}
.cell{aspect-ratio:1/1;position:relative;z-index:1;border:1px solid var(--line);background:rgba(255,255,255,0.05);border-radius:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:800;font-size:clamp(1rem,4.5vw,1.35rem);padding:4px}
.cell.called{background:rgba(34,197,94,0.28);border-color:rgba(34,197,94,0.65)}.cell.free{background:rgba(245,158,11,0.28);border-color:rgba(245,158,11,0.65);font-size:.95rem}

.history-list{display:grid;grid-template-columns:repeat(auto-fill, minmax(64px, 1fr));gap:8px;max-height:220px;overflow:auto;margin-top:10px}.history-item{border:1px solid var(--line);background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 6px;text-align:center;font-weight:800;font-size:1rem}.history-empty{color:var(--muted);font-size:.85rem;text-align:center;padding:10px 0 4px}
.footer{text-align:center;color:var(--muted);font-size:.74rem;margin-top:10px}.top-row{display:flex;justify-content:space-between;align-items:center;gap:10px}.room-pill{font-size:.78rem;color:var(--muted)}.big-next{width:100%;padding:18px 14px;font-size:1.12rem;border-radius:18px;box-shadow:0 10px 24px rgba(14,165,233,.22)}
.auth-screen{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(2,6,23,.94);backdrop-filter:blur(10px)}.auth-card{width:min(92vw,360px);border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(30,41,59,.96);box-shadow:0 18px 40px rgba(0,0,0,.45);padding:20px}.auth-title{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:8px}.auth-note{font-size:.86rem;color:var(--muted);line-height:1.6;text-align:center;margin-bottom:14px}.auth-error{font-size:.82rem;color:#fecaca;min-height:1.2em;margin-top:10px;text-align:center}
#appRoot{display:none}
</style>
</head>
<body>
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-title">主催者ログイン</div>
    <div class="auth-note">ルームIDと主催者パスワードを入力してください。</div>
    <div class="field"><label for="authRoom">ルームID</label><input id="authRoom" type="text" placeholder="例: dcr"></div>
    <div class="field"><label for="authPassword">主催者パスワード</label><input id="authPassword" type="password" placeholder="パスワード"></div>
    <button id="authLoginBtn" class="primary" type="button">ログインして主催者画面を開く</button>
    <div id="authError" class="auth-error"></div>
  </div>
</div>
<main id="appRoot" class="app">
  <div class="title">SHARED BINGO HOST</div>
  <section class="panel">
    <div class="top-row"><strong>主催者入口</strong><span class="room-pill">主催者専用</span></div>
    <div class="field"><label for="roomIdInput">ルームID</label><div class="inline"><input id="roomIdInput" type="text" placeholder="例: room-001"><button id="joinBtn" class="primary small" type="button">入室</button></div></div>
    <button id="settingsToggleBtn" class="accordion-btn" aria-expanded="false" type="button"><span>設定を開く</span><span class="accordion-icon">▼</span></button>
    <div id="settingsPanel" class="settings-panel">
      <div class="field"><label for="minInput">最小値</label><input id="minInput" type="number" value="1"></div>
      <div class="field"><label for="maxInput">最大値</label><input id="maxInput" type="number" value="75"></div>
      <div class="field"><label for="intervalInput">秒数</label><input id="intervalInput" type="number" min="1" max="3600" value="5"></div>
      <div class="field"><label><input id="uniqueMode" type="checkbox" checked> 重複なしモード</label></div>
      <div class="btn-grid"><button id="resetBtn" class="warn small" type="button">番号候補リセット</button><button id="regenCardsBtn" class="accent small" type="button">全カード再配布</button></div>
      <div class="note">ビンゴカード作成には最低24個の数字が必要です。</div>
    </div>
    <div class="btn-grid"><button id="startBtn" class="success" type="button">開始</button><button id="stopBtn" class="secondary" type="button">停止</button></div>
    <button id="manualBtn" class="primary big-next" type="button">次の番号を表示</button>
  </section>
  <section class="panel number-stage"><div id="number" class="number">-</div><div id="status" class="status">未接続</div><div id="roomStatus" class="room-status">ルーム未参加</div></section>
  <section class="panel"><div style="display:flex; justify-content:space-between; align-items:center; gap:10px;"><strong>あなたのビンゴカード</strong><button id="refreshCardBtn" class="secondary small" type="button">カード再読込</button></div><div class="meta"><span id="cardInfo">未参加</span><span id="lineInfo">ライン: 0 / リーチ: 0 / ビンゴ: なし</span></div><div class="bingo-head"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div id="bingoGrid" class="bingo-grid"></div></section>
  <section class="panel"><div style="display:flex; justify-content:space-between; align-items:center; gap:10px;"><strong>出た番号の履歴</strong><button id="clearHistoryBtn" class="danger small" type="button">共有履歴クリア</button></div><div class="meta"><span id="historyCount">件数: 0</span><span>新しい順</span></div><div id="historyEmpty" class="history-empty">まだ履歴はありません</div><div id="historyList" class="history-list" style="display:none;"></div></section>
  <div class="footer">SDK認証 + Long Polling対応の主催者版</div>
</main>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG={apiKey:"AIzaSyD2B71kUHJ_1h1pjr-QuhkG9JZlTGph-0E",authDomain:"b-i-n-g-o-ddeb9.firebaseapp.com",databaseURL:"https://b-i-n-g-o-ddeb9-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"b-i-n-g-o-ddeb9",storageBucket:"b-i-n-g-o-ddeb9.firebasestorage.app",messagingSenderId:"463735318581",appId:"1:463735318581:web:3e2623b24e1fd66231e97c"};
firebase.initializeApp(FIREBASE_CONFIG);const db=firebase.database();firebase.database.INTERNAL.forceLongPolling();
let roomRef=null,listener=null,timerId=null,remainingNumbers=[],currentHistory=[],roomDataCache=null;
const authScreen=document.getElementById("authScreen"),appRoot=document.getElementById("appRoot"),authRoom=document.getElementById("authRoom"),authPassword=document.getElementById("authPassword"),authLoginBtn=document.getElementById("authLoginBtn"),authError=document.getElementById("authError"),numberEl=document.getElementById("number"),statusEl=document.getElementById("status"),roomStatusEl=document.getElementById("roomStatus"),roomIdInput=document.getElementById("roomIdInput"),joinBtn=document.getElementById("joinBtn"),minInput=document.getElementById("minInput"),maxInput=document.getElementById("maxInput"),intervalInput=document.getElementById("intervalInput"),uniqueModeEl=document.getElementById("uniqueMode"),resetBtn=document.getElementById("resetBtn"),regenCardsBtn=document.getElementById("regenCardsBtn"),clearHistoryBtn=document.getElementById("clearHistoryBtn"),refreshCardBtn=document.getElementById("refreshCardBtn"),settingsToggleBtn=document.getElementById("settingsToggleBtn"),settingsPanel=document.getElementById("settingsPanel"),historyList=document.getElementById("historyList"),historyEmpty=document.getElementById("historyEmpty"),historyCount=document.getElementById("historyCount"),bingoGrid=document.getElementById("bingoGrid"),cardInfo=document.getElementById("cardInfo"),lineInfo=document.getElementById("lineInfo"),startBtn=document.getElementById("startBtn"),stopBtn=document.getElementById("stopBtn"),manualBtn=document.getElementById("manualBtn");
const clientId=(function(){const key="sharedBingoClientId";let id=localStorage.getItem(key);if(!id){id="client-"+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem(key,id)}return id})();
function setAuthError(t){authError.textContent=t||""} function setStatus(t){statusEl.textContent=t} function setRoomStatus(t){roomStatusEl.textContent=t}
function loadRoomIdFromUrl(){const p=new URLSearchParams(location.search);const room=p.get("room");if(room)roomIdInput.value=room}
function saveLocalSettings(){localStorage.setItem("sharedBingoHostRestOnly",JSON.stringify({roomId:roomIdInput.value}))}
function loadLocalSettings(){const raw=localStorage.getItem("sharedBingoHostRestOnly");if(!raw)return;try{const d=JSON.parse(raw);if(d.roomId)roomIdInput.value=d.roomId}catch(e){}}
function sanitizeRange(){let min=parseInt(minInput.value,10),max=parseInt(maxInput.value,10);if(isNaN(min))min=1;if(isNaN(max))max=75;if(min>max)[min,max]=[max,min];minInput.value=String(min);maxInput.value=String(max);return{min,max}}
function getIntervalSec(){let s=parseInt(intervalInput.value,10);if(isNaN(s)||s<1)s=1;if(s>3600)s=3600;intervalInput.value=String(s);return s}
function getRangeArray(min,max){const arr=[];for(let i=min;i<=max;i++)arr.push(i);return arr}
function refillNumbers(){const r=sanitizeRange();remainingNumbers=getRangeArray(r.min,r.max)}
function getNormalRandomNumber(){const r=sanitizeRange();return Math.floor(Math.random()*(r.max-r.min+1))+r.min}
function getUniqueRandomNumber(){if(remainingNumbers.length===0)refillNumbers();const idx=Math.floor(Math.random()*remainingNumbers.length);const v=remainingNumbers[idx];remainingNumbers.splice(idx,1);return v}
function generateCalledNumber(){return uniqueModeEl.checked?getUniqueRandomNumber():getNormalRandomNumber()}
function renderHistory(list){const arr=Array.isArray(list)?list:[];currentHistory=arr;historyCount.textContent="件数: "+arr.length;if(arr.length===0){historyEmpty.style.display="block";historyList.style.display="none";historyList.innerHTML="";return}historyEmpty.style.display="none";historyList.style.display="grid";historyList.innerHTML=arr.map(v=>'<div class="history-item">'+v+'</div>').join("")}
function renderBingoCard(card){bingoGrid.innerHTML="";if(!Array.isArray(card)||card.length!==25){for(let i=0;i<25;i++){const d=document.createElement("div");d.className="cell";d.textContent=i===12?"FREE":"-";if(i===12)d.classList.add("free");bingoGrid.appendChild(d)}cardInfo.textContent="カード未取得";lineInfo.textContent="ライン: 0 / リーチ: 0 / ビンゴ: なし";return}const called=new Set(currentHistory);card.forEach((value,idx)=>{const d=document.createElement("div");d.className="cell";if(idx===12){d.textContent="FREE";d.classList.add("free")}else{d.textContent=String(value);if(called.has(value))d.classList.add("called")}bingoGrid.appendChild(d)});cardInfo.textContent="参加者ID: "+clientId.slice(-8)}
function hashString(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}return h>>>0}
function mulberry32(seed){return function(){let t=seed+=1831565813;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function shuffleWithSeed(array,seed){const arr=array.slice(),rand=mulberry32(seed);for(let i=arr.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function buildCardFromNumbers(numbers){const card=new Array(25).fill(null);let ptr=0;for(let i=0;i<25;i++)card[i]=i===12?"FREE":numbers[ptr++];return card}
function serializeCard(card){return JSON.stringify(card)}
function extractExistingSignatures(participants){const set=new Set();if(!participants||typeof participants!=="object")return set;Object.values(participants).forEach(p=>{if(p&&Array.isArray(p.card))set.add(serializeCard(p.card))});return set}
function createUniqueCard(roomId,min,max,existing,version,startNonce=0){const pool=getRangeArray(min,max);if(pool.length<24)throw new Error("カード作成には最低24個の数字が必要です");for(let nonce=startNonce;nonce<startNonce+5000;nonce++){const seed=hashString(roomId+"|"+clientId+"|"+version+"|"+nonce),shuffled=shuffleWithSeed(pool,seed),picked=shuffled.slice(0,24),posSeed=hashString("pos|"+roomId+"|"+clientId+"|"+version+"|"+nonce),positioned=shuffleWithSeed(picked,posSeed),card=buildCardFromNumbers(positioned),signature=serializeCard(card);if(!existing.has(signature))return{card,signature}}throw new Error("一意なカードを生成できませんでした")}
async function ensureOwnCard(){if(!roomDataCache||!roomRef)return;const min=roomDataCache.min||1,max=roomDataCache.max||75,version=roomDataCache.cardVersion||1,participants=roomDataCache.participants||{},self=participants[clientId];if(self&&Array.isArray(self.card)&&self.card.length===25&&self.cardVersion===version){renderBingoCard(self.card);return}const existing=extractExistingSignatures(participants),result=createUniqueCard(roomIdInput.value.trim(),min,max,existing,version);await roomRef.update({["participants/"+clientId]:{joinedAt:Date.now(),card:result.card,cardVersion:version,signature:result.signature}});renderBingoCard(result.card)}
async function commonJoinRoom(){const roomId=roomIdInput.value.trim();if(!roomId){setStatus("ルームIDを入力してください");return false}if(roomRef&&listener){roomRef.off("value",listener);listener=null}roomRef=db.ref("sharedBingoRooms/"+roomId);const snap=await roomRef.once("value");if(!snap.exists()){const r=sanitizeRange();if(r.max-r.min+1<24){setStatus("範囲が狭すぎます。最低24個必要です");return false}await roomRef.update({min:r.min,max:r.max,intervalSec:getIntervalSec(),uniqueMode:uniqueModeEl.checked,history:[],currentNumber:null,isRunning:false,cardVersion:1,participants:{},updatedAt:Date.now()})}listener=async snapshot=>{const data=snapshot.val();roomDataCache=data;if(!data){numberEl.textContent="-";renderHistory([]);renderBingoCard(null);setRoomStatus("ルーム: "+roomId+"（未初期化）");return}numberEl.textContent=data.currentNumber==null?"-":String(data.currentNumber);renderHistory(Array.isArray(data.history)?data.history:[]);const mode=data.uniqueMode?"重複なし":"通常",running=data.isRunning?"動作中":"停止中";setRoomStatus("ルーム: "+roomId+" / "+(data.min??1)+"〜"+(data.max??75)+" / "+(data.intervalSec??5)+"秒 / "+mode);await ensureOwnCard();setStatus("主催者として接続中（"+running+"）")};roomRef.on("value",listener);setRoomStatus("ルーム: "+roomId);return true}
function clearTimer(){if(timerId!==null){clearInterval(timerId);timerId=null}}
async function writeRoomState(patch){if(roomRef)await roomRef.update(patch)}
function buildNextHistory(next){return [next,...currentHistory].slice(0,300)}
function buildRoomState(next,isRunning){const r=sanitizeRange();return{currentNumber:next,min:r.min,max:r.max,intervalSec:getIntervalSec(),uniqueMode:uniqueModeEl.checked,remainingNumbers:uniqueModeEl.checked?remainingNumbers:[],history:buildNextHistory(next),isRunning,updatedAt:Date.now()}}
async function pushNextNumber(isRunningOverride){if(!roomRef){setStatus("先にルームに参加してください");return}const r=sanitizeRange();if(r.max-r.min+1<24){setStatus("範囲が狭すぎます。最低24個必要です");return}const next=generateCalledNumber(),state=buildRoomState(next,isRunningOverride);await writeRoomState(state);numberEl.textContent=String(next);renderHistory(state.history)}
async function startHost(){if(!roomRef){setStatus("先にルームに参加してください");return}const r=sanitizeRange();if(r.max-r.min+1<24){setStatus("ビンゴカード作成には最低24個の数字が必要です");return}clearTimer();if(uniqueModeEl.checked)refillNumbers();await writeRoomState({min:r.min,max:r.max,intervalSec:getIntervalSec(),uniqueMode:uniqueModeEl.checked,updatedAt:Date.now()});await pushNextNumber(true);timerId=setInterval(()=>{pushNextNumber(true).catch(e=>{console.error(e);setStatus("更新エラー");clearTimer()})},getIntervalSec()*1000);setStatus("主催者として配信中")}
async function stopHost(){clearTimer();if(roomRef)await writeRoomState({isRunning:false,updatedAt:Date.now()});setStatus("停止中")}
async function resetUniqueState(){refillNumbers();if(roomRef){const r=sanitizeRange();await writeRoomState({min:r.min,max:r.max,intervalSec:getIntervalSec(),uniqueMode:uniqueModeEl.checked,remainingNumbers:uniqueModeEl.checked?remainingNumbers:[],updatedAt:Date.now()})}setStatus("番号候補をリセットしました")}
async function clearSharedHistory(){if(!roomRef){setStatus("先にルームに参加してください");return}await writeRoomState({history:[],currentNumber:null,updatedAt:Date.now()});renderHistory([]);numberEl.textContent="-";setStatus("共有履歴をクリアしました")}
async function regenerateAllCards(){if(!roomRef){setStatus("先にルームに参加してください");return}const r=sanitizeRange();if(r.max-r.min+1<24){setStatus("ビンゴカード作成には最低24個の数字が必要です");return}const next=((roomDataCache&&roomDataCache.cardVersion)||1)+1;await writeRoomState({min:r.min,max:r.max,cardVersion:next,participants:{},updatedAt:Date.now()});setStatus("全参加者のカードを再配布します")}
async function reloadOwnCard(){if(!roomRef||!roomDataCache){setStatus("先にルームに参加してください");return}await ensureOwnCard();setStatus("カードを再読込しました")}
async function hostPasswordLogin(){const room=authRoom.value.trim(),pw=authPassword.value.trim();if(!room){setAuthError("ルームIDを入力してください");return}if(!pw){setAuthError("パスワードを入力してください");return}authLoginBtn.disabled=true;setAuthError("");try{const snap=await db.ref("sharedBingoRooms/"+room+"/hostPassword").once("value");const dbPw=String(snap.val()||"").trim();if(!dbPw){setAuthError("主催者パスワードが未設定です");return}if(dbPw!==pw){setAuthError("パスワード違う");return}roomIdInput.value=room;saveLocalSettings();authScreen.style.display="none";appRoot.style.display="block";await commonJoinRoom();setStatus("主催者として参加済み")}catch(e){console.error(e);setAuthError("ログインに失敗しました") }finally{authLoginBtn.disabled=false}}
authLoginBtn.onclick=hostPasswordLogin;authPassword.addEventListener("keydown",e=>{if(e.key==="Enter")hostPasswordLogin()});authRoom.addEventListener("keydown",e=>{if(e.key==="Enter")hostPasswordLogin()});
joinBtn.onclick=()=>commonJoinRoom().catch(e=>{console.error(e);setStatus("参加エラー")});
startBtn.onclick=()=>startHost().catch(e=>{console.error(e);setStatus("開始エラー")});
stopBtn.onclick=()=>stopHost().catch(e=>{console.error(e);setStatus("停止エラー")});
manualBtn.onclick=()=>{if(uniqueModeEl.checked&&remainingNumbers.length===0)refillNumbers();pushNextNumber(false).then(()=>setStatus("1回表示しました")).catch(e=>{console.error(e);setStatus("表示エラー")})};
resetBtn.onclick=()=>resetUniqueState().catch(e=>{console.error(e);setStatus("リセットエラー")});
regenCardsBtn.onclick=()=>regenerateAllCards().catch(e=>{console.error(e);setStatus("カード再配布エラー")});
