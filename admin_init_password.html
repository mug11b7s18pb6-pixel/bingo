<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>主催者パスワード初期設定</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:#0f172a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.card{width:100%;max-width:360px;background:#1e293b;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:20px}
input,button{width:100%;padding:12px 14px;border-radius:12px;border:none;margin-top:10px;font-size:16px}
input{background:#334155;color:#fff}
button{background:#0ea5e9;color:#fff;font-weight:700}
.note{color:#cbd5e1;font-size:.9rem;line-height:1.5}
.msg{margin-top:10px;color:#fecaca;min-height:1.2em}
</style>
</head>
<body>
<div class="card">
  <h2>主催者パスワード初期設定</h2>
  <div class="note">URLの <code>?room=</code> に入っているルームの主催者パスワードを初期登録します。</div>
  <input id="pw" type="password" placeholder="新しい主催者パスワード">
  <button id="saveBtn" type="button">初期設定する</button>
  <div id="msg" class="msg"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2B71kUHJ_1h1pjr-QuhkG9JZlTGph-0E",
  authDomain: "b-i-n-g-o-ddeb9.firebaseapp.com",
  databaseURL: "https://b-i-n-g-o-ddeb9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "b-i-n-g-o-ddeb9",
  storageBucket: "b-i-n-g-o-ddeb9.firebasestorage.app",
  messagingSenderId: "463735318581",
  appId: "1:463735318581:web:3e2623b24e1fd66231e97c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const params = new URLSearchParams(location.search);
const roomId = params.get("room");
const msg = document.getElementById("msg");
document.getElementById("saveBtn").addEventListener("click", async () => {
  const pw = document.getElementById("pw").value;
  if (!roomId) { msg.textContent = "URLに room がありません"; return; }
  if (!pw) { msg.textContent = "パスワードを入力してください"; return; }
  await set(ref(db, "sharedBingoRooms/" + roomId + "/hostPassword"), pw);
  msg.style.color = "#86efac";
  msg.textContent = "初期設定完了";
});
</script>
</body>
</html>
